<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Usage</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("codexUsageTheme");
          const fallback = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = saved || fallback;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Codex Usage</h1>
          <p id="subtitle">正在扫描本机 Codex 用量...</p>
          <p id="autoRefreshStatus">自动刷新准备中...</p>
        </div>
        <div class="topbar-actions">
          <div class="theme-toggle" id="themeToggle" role="group" aria-label="主题">
            <button type="button" data-theme-option="light">浅色</button>
            <button type="button" data-theme-option="dark">深色</button>
          </div>
          <button id="importButton" type="button">导入目录</button>
          <button id="refreshButton" type="button">强制重扫</button>
        </div>
      </header>

      <section class="toolbar" aria-label="筛选">
        <div class="control-group">
          <span>范围</span>
          <div class="segmented" id="presetButtons">
            <button type="button" data-preset="today">今日</button>
            <button type="button" data-preset="week">本周</button>
            <button type="button" data-preset="month">本月</button>
            <button type="button" data-preset="all" class="active">全部</button>
            <div class="recent-segment" data-preset="recent">
              <span class="recent-segment-label">最近</span>
              <span class="recent-combobox">
                <input
                  id="recentValue"
                  class="recent-segment-input"
                  type="text"
                  value="1个月"
                  autocomplete="off"
                  aria-label="最近范围"
                  aria-controls="recentRangeMenu"
                  aria-expanded="false"
                  aria-haspopup="listbox"
                />
                <button
                  id="recentMenuButton"
                  class="recent-menu-button"
                  type="button"
                  aria-label="展开最近范围选项"
                  aria-controls="recentRangeMenu"
                  aria-expanded="false"
                >
                </button>
              </span>
              <div id="recentRangeMenu" class="recent-range-menu" role="listbox" hidden>
                <button type="button" role="option" data-recent-option="1天" aria-selected="false">1天</button>
                <button type="button" role="option" data-recent-option="1周" aria-selected="false">1周</button>
                <button type="button" role="option" data-recent-option="1个月" aria-selected="true">1个月</button>
                <button type="button" role="option" data-recent-option="2个月" aria-selected="false">2个月</button>
                <button type="button" role="option" data-recent-option="3个月" aria-selected="false">3个月</button>
                <button type="button" role="option" data-recent-option="半年" aria-selected="false">半年</button>
                <button type="button" role="option" data-recent-option="一年" aria-selected="false">一年</button>
              </div>
            </div>
            <button type="button" data-preset="custom">自定义</button>
          </div>
        </div>
        <div class="control-group custom-range">
          <label>
            开始
            <input id="startDate" type="date" />
          </label>
          <label>
            结束
            <input id="endDate" type="date" />
          </label>
        </div>
        <div class="control-group">
          <label>
            粒度
            <select id="bucketSelect">
              <option value="day">按天</option>
              <option value="week">按周</option>
              <option value="month">按月</option>
            </select>
          </label>
        </div>
      </section>

      <section class="metrics" aria-label="总览">
        <article class="metric">
          <span>总 tokens</span>
          <strong id="totalTokens">-</strong>
        </article>
        <article class="metric">
          <span>输入</span>
          <strong id="inputTokens">-</strong>
        </article>
        <article class="metric">
          <span>缓存输入</span>
          <strong id="cachedTokens">-</strong>
        </article>
        <article class="metric">
          <span>输出</span>
          <strong id="outputTokens">-</strong>
        </article>
        <article class="metric">
          <span>推理输出</span>
          <strong id="reasoningTokens">-</strong>
        </article>
        <article class="metric">
          <span>会话</span>
          <strong id="sessionCount">-</strong>
        </article>
      </section>

      <section id="comparisonSummary" class="comparison-strip" aria-label="趋势变化"></section>

      <section class="main-grid">
        <section class="panel chart-panel">
          <div class="panel-heading">
            <h2>时间分布</h2>
            <span id="rangeLabel"></span>
          </div>
          <canvas id="timelineChart" width="960" height="320"></canvas>
          <div id="timelineDetails" class="timeline-details" aria-label="时间分布明细"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>渠道分布</h2>
          </div>
          <div id="channelList" class="bar-list"></div>
        </section>
      </section>

      <section class="wide-grid">
        <section class="panel">
          <div class="panel-heading">
            <h2>项目目录</h2>
            <div class="list-tools">
              <input id="projectSearch" type="search" autocomplete="off" placeholder="搜索项目" aria-label="搜索项目目录" />
              <button id="projectToggle" class="panel-action" type="button" aria-expanded="false" hidden>展开</button>
            </div>
          </div>
          <div id="projectList" class="compact-list"></div>
        </section>
        <section class="panel">
          <div class="panel-heading">
            <h2>模型分布</h2>
            <div class="list-tools">
              <input id="modelSearch" type="search" autocomplete="off" placeholder="搜索模型" aria-label="搜索模型" />
              <button id="modelToggle" class="panel-action" type="button" aria-expanded="false" hidden>展开</button>
            </div>
          </div>
          <div id="modelList" class="compact-list"></div>
        </section>
      </section>

      <section class="panel homes-panel">
        <div class="panel-heading">
          <h2>扫描目录</h2>
          <button id="addImportButton" class="panel-action" type="button">添加</button>
        </div>
        <div id="homeList" class="home-list"></div>
      </section>
    </main>
    <div id="importDialog" class="dialog-backdrop" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="importDialogTitle">
        <form id="importForm">
          <div class="dialog-heading">
            <h2 id="importDialogTitle">导入目录</h2>
            <button id="closeImportDialogButton" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
          <p class="dialog-copy">支持 Codex home，或包含 .codex-usage/usage.jsonl 的项目目录。</p>
          <label>
            目录路径
            <div class="path-picker">
              <input id="importPath" type="text" autocomplete="off" placeholder="/Users/you/project/openai_codex" />
              <button id="pickImportDirectoryButton" type="button">选择文件夹</button>
            </div>
          </label>
          <p id="importMessage" class="dialog-message" role="status"></p>
          <div class="dialog-actions">
            <button id="cancelImportButton" type="button">取消</button>
            <button id="submitImportButton" type="submit">导入</button>
          </div>
        </form>
      </section>
    </div>
    <div id="usageTooltip" class="usage-tooltip" role="tooltip" hidden></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
